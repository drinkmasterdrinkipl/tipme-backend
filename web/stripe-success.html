<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konto gotowe — Tip For Me</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0c0a13;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      background: #13111c;
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 900; color: #f0eef5; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #a855f7;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      padding: 16px 36px;
      border-radius: 16px;
      text-decoration: none;
    }
    .note { margin-top: 20px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Konto gotowe!</h1>
    <p>Twoje konto Tip For Me zostało skonfigurowane.<br>Wróć do aplikacji aby zacząć zbierać napiwki.</p>
    <a href="tipforme://stripe/success" class="btn">Otwórz aplikację →</a>
    <p class="note">Możesz zamknąć tę stronę i wrócić do aplikacji.</p>
  </div>
</body>
</html>
